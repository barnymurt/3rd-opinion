<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Second Opinion</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fa;
    }
    .popup-container {
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .header-text h1 {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a2e;
    }
    .header-text p {
      font-size: 12px;
      color: #666;
    }
    .credits-card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .credits-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
    }
    .credits-value {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a2e;
    }
    .credits-value span {
      font-size: 14px;
      font-weight: 500;
      color: #666;
    }
    .upgrade-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .upgrade-btn:hover {
      transform: scale(1.02);
    }
    .features {
      margin-top: 20px;
    }
    .features h3 {
      font-size: 13px;
      color: #666;
      margin-bottom: 12px;
    }
    .feature-list {
      list-style: none;
    }
    .feature-list li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      font-size: 13px;
      color: #444;
    }
    .feature-list li svg {
      flex-shrink: 0;
      color: #667eea;
    }
    .footer {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #eee;
      display: flex;
      justify-content: space-between;
    }
    .footer a {
      font-size: 12px;
      color: #667eea;
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>Second Opinion</h1>
        <p>Balance AI's tendency to agree</p>
      </div>
    </div>

    <div class="credits-card">
      <div class="credits-label">Free credits remaining</div>
      <div class="credits-value">20 <span>/ month</span></div>
    </div>

    <button class="upgrade-btn" id="upgradeBtn">Upgrade to Pro</button>

    <div class="features">
      <h3>Pro Features</h3>
      <ul class="feature-list">
        <li>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          100 opinions/month
        </li>
        <li>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          Multiple AI perspectives
        </li>
        <li>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          Text-to-speech
        </li>
        <li>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          History & saved opinions
        </li>
      </ul>
    </div>

    <div class="footer">
      <a href="#" id="dashboardLink">Dashboard</a>
      <a href="#">Settings</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
